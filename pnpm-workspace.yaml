packages:
  - "apps/*"
  - "packages/*"
# Expo / React Native need a flat node_modules so Metro + NativeWind's
# babel-injected imports (e.g. `react-native-css-interop/jsx-runtime`) resolve
# from app files. pnpm 11 reads these from here, NOT `.npmrc`.
nodeLinker: hoisted
strictPeerDependencies: false
autoInstallPeers: true
# Pin better-call so better-auth's scoped packages all resolve the same version
# (prevents the hoisted-linker picking an older copy that breaks @better-auth/core).
overrides:
  better-call: "1.3.6"
allowBuilds:
  # Unused optional peers pulled in by better-auth's adapter surface — keep disabled.
  '@prisma/client': false
  better-sqlite3: false
  # Native deps we actually rely on (bundlers, image processing, resolver).
  esbuild: true
  sharp: true
  unrs-resolver: true
